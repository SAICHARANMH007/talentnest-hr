name: Keep Render Server Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes — Render sleeps at 15 min inactivity
  workflow_dispatch:          # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://talentnest-hr.onrender.com/api/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: got $STATUS (server may be waking up)"
          fi
